# Nginx configuration for Matan Topics & Python Quiz
# Add these location blocks inside your server {} block

# API endpoints (proxy to Flask on port 5001)
location = /matan_topics/load {
    proxy_pass http://127.0.0.1:5001;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
}

location = /matan_topics/theory {
    proxy_pass http://127.0.0.1:5001;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
}

location = /matan_topics/save {
    proxy_pass http://127.0.0.1:5001;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
}

# Static frontend
location /matan_topics/ {
    alias /var/www/html/matan-topics/;
    index index.html;
}

location = /matan_topics {
    return 301 /matan_topics/;
}
