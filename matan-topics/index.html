<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Темы матанализа — матшкола и 1–2 курс</title>
  <style>
    :root {
      --bg: #0f1419;
      --card: #1a2332;
      --border: #2d3a4f;
      --accent: #58a6ff;
      --accent-dim: rgba(88, 166, 255, 0.15);
      --green: #3fb950;
      --text: #e6edf3;
      --muted: #8b949e;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
      line-height: 1.5;
    }

    /* ── Two-column layout ── */
    .page-wrapper {
      display: flex;
      gap: 28px;
      align-items: flex-start;
      max-width: 1380px;
      margin: 0 auto;
      padding: 32px 20px;
    }
    .main-col {
      flex: 0 0 600px;
      min-width: 0;
    }
    .theory-col {
      flex: 1;
      min-width: 280px;
      position: sticky;
      top: 20px;
      display: none;
    }
    .theory-col.visible {
      display: block;
    }
    .theory-col-inner {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
    }
    .theory-col-header {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 14px 16px 12px;
      border-bottom: 1px solid var(--border);
      background: rgba(88, 166, 255, 0.07);
    }
    .theory-col-num {
      color: var(--muted);
      font-size: 0.8rem;
      flex-shrink: 0;
      padding-top: 3px;
    }
    .theory-col-title {
      flex: 1;
      font-size: 0.95rem;
      font-weight: 600;
      color: var(--accent);
      line-height: 1.4;
    }
    .theory-col-close {
      background: none;
      border: none;
      color: var(--muted);
      cursor: pointer;
      font-size: 1rem;
      padding: 0 2px;
      flex-shrink: 0;
      line-height: 1;
      transition: color 0.15s;
    }
    .theory-col-close:hover { color: var(--text); }
    .theory-col-body {
      padding: 16px;
    }
    .theory-p {
      font-size: 0.9rem;
      color: var(--text);
      margin-bottom: 12px;
      line-height: 1.7;
    }
    .theory-p:last-child { margin-bottom: 0; }
    .theory-status {
      font-size: 0.85rem;
      color: var(--muted);
      font-style: italic;
    }

    /* ── Main column ── */
    h1 {
      font-size: 1.5rem;
      font-weight: 600;
      margin-bottom: 6px;
    }
    .subtitle {
      color: var(--muted);
      font-size: 0.9rem;
      margin-bottom: 24px;
    }
    .toolbar {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 20px;
    }
    .btn {
      background: var(--card);
      color: var(--text);
      border: 1px solid var(--border);
      padding: 8px 14px;
      border-radius: 6px;
      font-size: 0.875rem;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
    }
    .btn:hover { background: var(--border); border-color: var(--accent); }
    .btn-primary { background: var(--accent); border-color: var(--accent); color: #fff; }
    .btn-primary:hover { filter: brightness(1.1); }
    .stats {
      color: var(--muted);
      font-size: 0.85rem;
      margin-bottom: 16px;
    }
    .topic-list { display: flex; flex-direction: column; gap: 2px; }

    /* ── Topic row ── */
    .topic {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 12px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
    }
    .topic:hover { background: var(--accent-dim); border-color: var(--accent); }
    .topic.selected { border-color: var(--accent); background: var(--accent-dim); }
    .topic input {
      width: 16px; height: 16px;
      accent-color: var(--accent);
      cursor: pointer;
      flex-shrink: 0;
    }
    .topic label { cursor: pointer; flex: 1; user-select: none; font-size: 0.9rem; }
    .topic .num { color: var(--muted); font-size: 0.78rem; min-width: 28px; }

    /* Theory toggle button */
    .theory-btn {
      background: none;
      border: 1px solid transparent;
      color: var(--muted);
      width: 24px; height: 24px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 0.75rem;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s, border-color 0.15s, color 0.15s;
      padding: 0;
      line-height: 1;
    }
    .theory-btn:hover {
      background: var(--border);
      border-color: var(--accent);
      color: var(--accent);
    }
    .theory-btn.active {
      background: var(--accent-dim);
      border-color: var(--accent);
      color: var(--accent);
    }

    /* ── Section grouping ── */
    .section { margin-top: 24px; }
    .section:first-child { margin-top: 0; }
    .section-title {
      font-size: 1rem;
      font-weight: 600;
      color: var(--accent);
      padding: 10px 14px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px 8px 0 0;
      border-bottom: none;
    }
    .section-topics {
      border: 1px solid var(--border);
      border-radius: 0 0 8px 8px;
      overflow: hidden;
    }
    .section-topics .topic { border-radius: 0; border-left: none; border-right: none; }
    .section-topics .topic:first-child { border-top: none; }

    .saved-hint {
      font-size: 0.8rem;
      color: var(--green);
      margin-top: 16px;
      opacity: 0;
      transition: opacity 0.2s;
    }
    .saved-hint.visible { opacity: 1; }
    .current-user { font-size: 0.8rem; color: var(--muted); margin-bottom: 16px; }
    .current-user strong { color: var(--accent); font-weight: 500; }

    /* ── Responsive ── */
    @media (max-width: 960px) {
      .page-wrapper { flex-direction: column; }
      .main-col { flex: none; width: 100%; }
      .theory-col { position: static; width: 100%; min-width: 0; }
    }
  </style>
</head>

    const TOPICS = SECTIONS.flatMap(s => s.topics);

    // Currently active theory index (null = panel hidden)
    let activeTheoryIdx = null;

    function showTheory(idx) {
      const panelCol = document.getElementById('theory-col');
      const titleEl = document.getElementById('theory-col-title');
      const numEl = document.getElementById('theory-col-num');
      const bodyEl = document.getElementById('theory-col-body');

      // If same topic clicked — toggle off
      if (activeTheoryIdx === idx) {
        hideTheory();
        return;
      }

      // Deactivate previous button
      if (activeTheoryIdx !== null) {
        const prevBtn = document.querySelector(`.theory-btn[data-idx="${activeTheoryIdx}"]`);
        if (prevBtn) { prevBtn.classList.remove('active'); prevBtn.textContent = '▸'; }
      }

      activeTheoryIdx = idx;

      // Activate new button
      const btn = document.querySelector(`.theory-btn[data-idx="${idx}"]`);
      if (btn) { btn.classList.add('active'); btn.textContent = '▾'; }

      // Show panel with topic title
      titleEl.textContent = TOPICS[idx] || '';
      numEl.textContent = (idx + 1) + '.';
      bodyEl.innerHTML = '<span class="theory-status">Загрузка…</span>';
      panelCol.classList.add('visible');

      // Check cache
      if (theoryCache[idx] !== undefined) {
        renderTheoryBody(bodyEl, theoryCache[idx]);
        return;
      }

      fetch(API_BASE + '/matan_topics/theory?idx=' + idx)
        .then(r => r.json())
        .then(data => {
          const paragraphs = (data.paragraphs || []).slice(0, 5);
          theoryCache[idx] = paragraphs;
          // Only render if this topic is still active
          if (activeTheoryIdx === idx) renderTheoryBody(bodyEl, paragraphs);
        })
        .catch(() => {
          theoryCache[idx] = [];
          if (activeTheoryIdx === idx) renderTheoryBody(bodyEl, []);
        });
    }

    function renderTheoryBody(bodyEl, paragraphs) {
      if (paragraphs.length === 0) {
        bodyEl.innerHTML = '<span class="theory-status">Теория ещё не добавлена</span>';
      } else {
        bodyEl.innerHTML = paragraphs.map(p => `<p class="theory-p">${p}</p>`).join('');
      }
    }

    function hideTheory() {
      if (activeTheoryIdx !== null) {
        const btn = document.querySelector(`.theory-btn[data-idx="${activeTheoryIdx}"]`);
        if (btn) { btn.classList.remove('active'); btn.textContent = '▸'; }
        activeTheoryIdx = null;
      }
      document.getElementById('theory-col').classList.remove('visible');
    }

    const theoryCache = {};

    function selectedToSections(selected) {
      const sections = {};
      let globalIdx = 0;
      SECTIONS.forEach(section => {
        const localSelected = [];
        section.topics.forEach((_, localIdx) => {
          if (selected.has(globalIdx)) localSelected.push(localIdx);
          globalIdx++;
        });
        sections[section.title] = localSelected;
      });
      return sections;
    }

    function sectionsToSelected(sections) {
      const result = new Set();
      let globalIdx = 0;
      SECTIONS.forEach(section => {
        const localList = sections[section.title];
        if (Array.isArray(localList)) {
          localList.forEach(localIdx => {
            const g = globalIdx + localIdx;
            if (g < TOPICS.length) result.add(g);
          });
        }
        globalIdx += section.topics.length;
      });
      return result;
    }

    function saveToServer(selected) {
      const sections = selectedToSections(selected);
      return fetch(API_BASE + '/matan_topics/save', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name: USER_NAME, sections })
      }).then(r => r.json()).then(data => { if (data.ok) showSavedHint(); }).catch(() => {});
    }

    function loadFromServer(name) {
      return fetch(API_BASE + '/matan_topics/load?name=' + encodeURIComponent(name))
        .then(r => r.json())
        .then(data => {
          if (data.sections && typeof data.sections === 'object') return sectionsToSelected(data.sections);
          const arr = (data.selected || []).filter(i => i >= 0 && i < TOPICS.length);
          return new Set(arr);
        });
    }

    function showSavedHint() {
      const el = document.getElementById('saved-hint');
      el.classList.add('visible');
      clearTimeout(showSavedHint._t);
      showSavedHint._t = setTimeout(() => el.classList.remove('visible'), 1500);
    }

    function render(selected) {
      const list = document.getElementById('topic-list');
      let globalIdx = 0;
      let html = '';
      SECTIONS.forEach(section => {
        html += `<div class="section"><div class="section-title">${section.title}</div><div class="section-topics">`;
        section.topics.forEach(title => {
          const i = globalIdx++;
          const id = 't' + i;
          const checked = selected.has(i);
          const isActive = (i === activeTheoryIdx);
          html += `
            <div class="topic ${checked ? 'selected' : ''}" data-idx="${i}">
              <input type="checkbox" id="${id}" ${checked ? 'checked' : ''}>
              <span class="num">${i + 1}.</span>
              <label for="${id}">${title}</label>
              <button class="theory-btn${isActive ? ' active' : ''}" data-idx="${i}" title="Теория" type="button">${isActive ? '▾' : '▸'}</button>
            </div>`;
        });
        html += '</div></div>';
      });
      list.innerHTML = html;

      document.getElementById('stats').textContent =
        `Выбрано: ${selected.size} из ${TOPICS.length}`;

      list.querySelectorAll('.topic').forEach(topicEl => {
        const idx = parseInt(topicEl.dataset.idx, 10);
        const checkbox = topicEl.querySelector('input');
        const theoryBtn = topicEl.querySelector('.theory-btn');
        const update = () => {
          if (checkbox.checked) selected.add(idx);
          else selected.delete(idx);
          topicEl.classList.toggle('selected', selected.has(idx));
          document.getElementById('stats').textContent =
            `Выбрано: ${selected.size} из ${TOPICS.length}`;
          saveToServer(selected);
        };
        checkbox.addEventListener('change', update);
        topicEl.addEventListener('click', (e) => {
          if (e.target === checkbox || e.target === theoryBtn) return;
          checkbox.checked = !checkbox.checked;
          update();
        });
        theoryBtn.addEventListener('click', (e) => {
          e.stopPropagation();
          showTheory(idx);
        });
      });
    }

    function init() {
      const selected = new Set();
      document.getElementById('current-user-id').textContent = USER_NAME;

      document.getElementById('btn-select-all').addEventListener('click', () => {
        TOPICS.forEach((_, i) => selected.add(i));
        render(selected);
        saveToServer(selected);
      });
      document.getElementById('btn-clear').addEventListener('click', () => {
        selected.clear();
        render(selected);
        saveToServer(selected);
      });
      document.getElementById('btn-invert').addEventListener('click', () => {
        TOPICS.forEach((_, i) => { if (selected.has(i)) selected.delete(i); else selected.add(i); });
        render(selected);
        saveToServer(selected);
      });
      document.getElementById('theory-col-close').addEventListener('click', hideTheory);

      render(selected);

      loadFromServer(USER_NAME).then(loadedSet => {
        if (loadedSet instanceof Set) loadedSet.forEach(i => selected.add(i));
        else (loadedSet || []).forEach(i => selected.add(i));
        render(selected);
      }).catch(() => render(selected));
    }

    init();
  </script>
</body>
</html>
